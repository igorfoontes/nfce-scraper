spring.application.name=nfce-scraper
server.port=${PORT:8090}

# Google Gemini (same key/model family as finance-api)
gemini.api-key=${GEMINI_API_KEY:}

# SEFAZ fetch tuning
sefaz.timeout-ms=${SEFAZ_TIMEOUT_MS:20000}
sefaz.user-agent=Mozilla/5.0 (Linux; Android 14) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Mobile Safari/537.36

management.endpoints.web.exposure.include=health,info
